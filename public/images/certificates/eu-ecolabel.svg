<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="90" fill="white" />
  <!-- Stars -->
  <g fill="#003399">
    <polygon points="100,20 105,35 120,35 108,45 112,60 100,50 88,60 92,45 80,35 95,35" transform="rotate(0 100 100)" />
    <polygon points="100,20 105,35 120,35 108,45 112,60 100,50 88,60 92,45 80,35 95,35" transform="rotate(30 100 100)" />
    <polygon points="100,20 105,35 120,35 108,45 112,60 100,50 88,60 92,45 80,35 95,35" transform="rotate(60 100 100)" />
    <polygon points="100,20 105,35 120,35 108,45 112,60 100,50 88,60 92,45 80,35 95,35" transform="rotate(90 100 100)" />
    <polygon points="100,20 105,35 120,35 108,45 112,60 100,50 88,60 92,45 80,35 95,35" transform="rotate(120 100 100)" />
    <polygon points="100,20 105,35 120,35 108,45 112,60 100,50 88,60 92,45 80,35 95,35" transform="rotate(150 100 100)" />
    <polygon points="100,20 105,35 120,35 108,45 112,60 100,50 88,60 92,45 80,35 95,35" transform="rotate(180 100 100)" />
    <polygon points="100,20 105,35 120,35 108,45 112,60 100,50 88,60 92,45 80,35 95,35" transform="rotate(210 100 100)" />
    <polygon points="100,20 105,35 120,35 108,45 112,60 100,50 88,60 92,45 80,35 95,35" transform="rotate(240 100 100)" />
    <polygon points="100,20 105,35 120,35 108,45 112,60 100,50 88,60 92,45 80,35 95,35" transform="rotate(270 100 100)" />
    <polygon points="100,20 105,35 120,35 108,45 112,60 100,50 88,60 92,45 80,35 95,35" transform="rotate(300 100 100)" />
    <polygon points="100,20 105,35 120,35 108,45 112,60 100,50 88,60 92,45 80,35 95,35" transform="rotate(330 100 100)" />
  </g>
  <!-- Flower Stem -->
  <path d="M100,160 C100,160 90,120 70,110" stroke="#4a9c2d" stroke-width="6" fill="none" />
  <path d="M100,160 C100,160 110,120 130,110" stroke="#4a9c2d" stroke-width="6" fill="none" />
  <path d="M100,160 L100,90" stroke="#4a9c2d" stroke-width="6" />
  <!-- E -->
  <text x="100" y="100" font-family="Arial, sans-serif" font-weight="bold" font-size="60" fill="#003399" text-anchor="middle" transform="rotate(15 100 100)">€</text>
  <text x="100" y="180" font-family="Arial, sans-serif" font-weight="bold" font-size="24" fill="#003399" text-anchor="middle">EU Ecolabel</text>
</svg>
